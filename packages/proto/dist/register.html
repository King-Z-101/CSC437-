<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/page.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Register as Zookeeper</title>
  <script type="module" crossorigin src="/assets/register-DQrEJred.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/mustang-Dld7dAK7.js">
  <link rel="modulepreload" crossorigin href="/assets/state-DYFSCure.js">
  <link rel="modulepreload" crossorigin href="/assets/login-form-CcI5tHhP.js">
</head>
<body class="page">
  <mu-auth provides="zoo:auth">
    <header class="header_flex">
      <svg class="icon">
        <use href="./icons/animal.svg#icon-dire_wolf" />
      </svg>
      <h1>Prehistoric Zoo</h1>
      <nav class="nav">
        <a href="./index.html">Main Page</a>
      </nav>
    </header>
    <main class="page_grid">
      <div class="login-container">
        <h2>New Zookeeper Registration</h2>
        <div class="card">
          <login-form api="/auth/register" redirect="/index.html">
            <label>
              <span>Choose Zookeeper ID:</span>
              <input name="username" autocomplete="off" />
            </label>
            <label>
              <span>Create Password:</span>
              <input type="password" name="password" />
            </label>
            <slot name="button">
              <button type="submit">Register</button>
            </slot>
          </login-form>
        </div>
        <p>
          Already registered? <a href="login.html">Login here</a>
        </p>
      </div>
    </main>
  </mu-auth>
  <style>
    .login-container {
      max-width: 400px;
      margin: 2rem auto;
    }
    .card {
      background: var(--color-surface);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 1rem;
    }
    label span {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--color-border);
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: var(--color-primary-dark);
    }
  </style>
</body>
</html>
